<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Parametric Bellows Generator</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#1b1d23; --panel:#23262e; --panel-2:#2c303a; --text:#e7e9ee;
  --muted:#9aa1ad; --accent:#6ea8fe; --accent-2:#3d7bd6; --line:#383d49; --warn:#f0c674;
}
html, body { margin:0; height:100%; overflow:hidden; }
body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); }
#app { display:flex; height:100vh; }
#viewport { flex:1 1 auto; position:relative; min-width:0; background:#1b1d23; }
#glcanvas { display:block; width:100%; height:100%; touch-action:none; }
#panel { width:340px; flex:0 0 340px; background:var(--panel); border-left:1px solid var(--line); overflow-y:auto; padding:14px; }
#panel header h1 { font-size:18px; margin:0; }
#panel header .sub { color:var(--muted); font-size:12px; margin:2px 0 12px; }
.section { border:1px solid var(--line); border-radius:8px; margin-bottom:10px; overflow:hidden; }
.section > h2 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0; padding:8px 10px; background:var(--panel-2); }
.section .body { padding:8px 10px; }
.field { margin-bottom:10px; }
.field.hidden { display:none; }
.field label { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
.field label .val { color:var(--accent); font-variant-numeric:tabular-nums; }
.field input[type=range] { width:100%; accent-color:var(--accent); height:26px; }
.field select { width:100%; background:var(--panel-2); color:var(--text); border:1px solid var(--line); border-radius:6px; padding:8px; font-size:14px; }
.field.check label { cursor:pointer; align-items:center; }
.field.check input { transform:scale(1.3); margin-right:8px; }
#actions { display:flex; gap:8px; margin:8px 0; flex-wrap:wrap; }
#actions button { flex:1; min-width:120px; padding:12px; border:none; border-radius:7px; font-size:14px; font-weight:600; cursor:pointer; }
#export-stl { background:var(--accent); color:#0b1220; }
#reset { background:var(--panel-2); color:var(--text); border:1px solid var(--line); }
#stats { color:var(--muted); font-size:11px; margin:4px 0; }
.note { color:var(--muted); font-size:11px; line-height:1.45; }
.note code { color:var(--accent); }
.note.hidden { display:none; }
#variant-note { color:var(--warn); }
@media (max-width: 820px) {
  #app { flex-direction:column; }
  #viewport { order:-1; height:46vh; flex:none; }
  #panel { width:100%; flex:none; border-left:none; border-top:1px solid var(--line); }
}
</style>
</head>
<body>
<div id="app">
  <main id="viewport"><canvas id="glcanvas"></canvas></main>
  <aside id="panel">
    <header>
      <h1>Bellows Generator</h1>
      <p class="sub">Drag to rotate · pinch / scroll to zoom</p>
    </header>
    <div id="controls"></div>
    <div id="actions">
      <button id="export-stl">Download STL (collapsed)</button>
      <button id="reset">Reset</button>
    </div>
    <p id="stats"></p>
    <p id="variant-note" class="note hidden"></p>
    <p class="note">The exported STL is always the <b>collapsed</b> (printable) form.
      Print-flat in TPU with PLA interface layers in the fold gaps, then peel apart.
      No internet needed.</p>
  </aside>
</div>

<script>
"use strict";
// ===========================================================================
// 2D cross-section profiles (CCW point lists), centred on origin
// ===========================================================================
var SHAPES = ["circle","square","triangle","rounded_square"];
function clamp(x,lo,hi){ return Math.max(lo,Math.min(hi,x)); }
function frac(x){ return x - Math.floor(x); }
function dtor(d){ return d*Math.PI/180; }

function rrect(w,h,r,seg){
  var rr=clamp(r,0,Math.min(w/2,h/2)), cx=w/2-rr, cy=h/2-rr, pts=[];
  var corners=[[cx,-cy,-90],[cx,cy,0],[-cx,cy,90],[-cx,-cy,180]];
  for(var c=0;c<4;c++){ var ox=corners[c][0],oy=corners[c][1],a0=corners[c][2];
    for(var i=0;i<=seg;i++){ var a=dtor(a0+i*90/seg); pts.push([ox+rr*Math.cos(a),oy+rr*Math.sin(a)]); } }
  return pts;
}
function baseProfile(shape,sx,sy,cr,fn,cfn){
  if(shape==="circle"){ var p=[]; for(var i=0;i<fn;i++){ var a=i*2*Math.PI/fn; p.push([(sx/2)*Math.cos(a),(sy/2)*Math.sin(a)]); } return p; }
  if(shape==="triangle") return [[-sx/2,-sy/2],[sx/2,-sy/2],[0,sy/2]];
  if(shape==="rounded_square") return rrect(sx,sy,cr,cfn);
  return [[-sx/2,-sy/2],[sx/2,-sy/2],[sx/2,sy/2],[-sx/2,sy/2]];
}
function lineIntersect(p,dp,q,dq){
  var den=dp[0]*dq[1]-dp[1]*dq[0]; if(Math.abs(den)<1e-9) return null;
  var t=((q[0]-p[0])*dq[1]-(q[1]-p[1])*dq[0])/den; return [p[0]+t*dp[0], p[1]+t*dp[1]];
}
// Mitred offset of a convex CCW polygon by d (matches OpenSCAD offset(delta)).
function offsetPolygon(pts,d){
  var n=pts.length; if(Math.abs(d)<1e-9) return pts.map(function(p){return [p[0],p[1]];});
  var en=[]; for(var i=0;i<n;i++){ var a=pts[i],b=pts[(i+1)%n],dx=b[0]-a[0],dy=b[1]-a[1],L=Math.hypot(dx,dy)||1; en.push([dy/L,-dx/L]); }
  var res=[];
  for(var j=0;j<n;j++){
    var e0=(j-1+n)%n, A=pts[(j-1+n)%n], B=pts[j], C=pts[(j+1)%n];
    var p0=[B[0]+d*en[e0][0],B[1]+d*en[e0][1]], p1=[B[0]+d*en[j][0],B[1]+d*en[j][1]];
    var hit=lineIntersect(p0,[B[0]-A[0],B[1]-A[1]],p1,[C[0]-B[0],C[1]-B[1]]);
    if(hit) res.push(hit);
    else { var nx=(en[e0][0]+en[j][0])/2, ny=(en[e0][1]+en[j][1])/2, LL=Math.hypot(nx,ny)||1; res.push([B[0]+d*nx/LL,B[1]+d*ny/LL]); }
  }
  return res;
}

// ===========================================================================
// Meridian profile: list of {u (radial offset from valley), z, w (wall thick)}
// describing the wall path from the bottom mouth to the top mouth.
// ===========================================================================
function trapShape(f,ff){ var ff2=clamp(ff,0,0.24), span=0.5-2*ff2;
  if(f<ff2)return 0; if(f<0.5-ff2)return (f-ff2)/span; if(f<0.5+ff2)return 1; if(f<1-ff2)return 1-(f-(0.5+ff2))/span; return 0; }
function pleatDelta(f,depth,profile,tip){
  if(profile==="round") return depth*(0.5-0.5*Math.cos(2*Math.PI*f));
  if(profile==="trapezoid") return depth*trapShape(f,tip);
  return depth*(1-Math.abs(2*f-1));
}
function addConnector(M,p,isBottom,attachZ,wall,depth){
  var type=isBottom?p.bottomConnector:p.topConnector;
  if(type==="none") return;
  var len=isBottom?p.bottomLength:p.topLength;
  var fl=isBottom?p.bottomFlangeLength:p.topFlangeLength;
  var ft=isBottom?p.bottomFlangeThickness:p.topFlangeThickness;
  var so=(isBottom?p.bottomSocketClearance:p.topSocketClearance)+wall;
  function push(u,z,w){ M.push({u:u,z:z,w:w}); }
  if(isBottom){ // build from open mouth (below) UP to attach (0,attachZ)
    if(type==="collar"){ push(0,attachZ-len,wall); push(0,attachZ,wall); }
    else if(type==="socket"){ push(so,attachZ-len,wall); push(so,attachZ,wall); push(0,attachZ,wall); }
    else if(type==="flange"){ push(fl,attachZ-len,ft); push(0,attachZ-len,ft); push(0,attachZ,wall); }
    else if(type==="lip"){ push(fl,attachZ-len,wall); push(0,attachZ-len,wall); push(0,attachZ,wall); }
  } else { // build from attach (0,attachZ) UP to open mouth (above)
    if(type==="collar"){ push(0,attachZ,wall); push(0,attachZ+len,wall); }
    else if(type==="socket"){ push(0,attachZ,wall); push(so,attachZ,wall); push(so,attachZ+len,wall); }
    else if(type==="flange"){ push(0,attachZ,wall); push(0,attachZ+len,wall); push(fl,attachZ+len,ft); }
    else if(type==="lip"){ push(0,attachZ,wall); push(0,attachZ+len,wall); push(fl,attachZ+len,wall); }
  }
}
function buildMeridian(p){
  var wall=p.wallThickness, depth=p.pleatDepth;
  // collapsed fold pitch = one TPU wall + one interface/support gap, so the
  // gap that the slicer fills with peel-away support is ALWAYS positive (= the
  // print recipe from the Clough42 / Functional Print Friday method).
  var dz=(p.state==="collapsed")? (p.wallThickness+p.interfaceGap) : (p.extendedHeight/(2*Math.max(1,p.pleatCount)));
  dz=Math.max(0.05,dz);
  var nHalf=2*p.pleatCount, M=[];
  function push(u,z,w){ M.push({u:u,z:z,w:w}); }

  addConnector(M,p,true,0,wall,depth);
  if(M.length===0 || Math.abs(M[M.length-1].u)>1e-9 || Math.abs(M[M.length-1].z)>1e-9) push(0,0,wall);

  if(p.foldStyle==="flat_layer"){
    var z=0, ph=p.startWithPeak?1:0;
    for(var k=0;k<nHalf;k++){
      var tU=(((k+ph)%2)===0)?depth:0;
      push(tU,z,wall);      // flat membrane
      z+=dz; push(tU,z,wall);  // riser to next layer
    }
  } else { // accordion
    var seg=Math.max(2,p.segmentsPerPleat), steps=p.pleatCount*seg, pitch=2*dz, ph=p.startWithPeak?0.5:0;
    for(var i=1;i<=steps;i++){
      var zz=(i/seg)*pitch, u=pleatDelta(frac(i/seg+ph),depth,p.foldProfile,p.tipFlatFraction);
      push(u,zz,wall);
    }
  }
  var pleatTop=M[M.length-1].z;
  addConnector(M,p,false,pleatTop,wall,depth);

  // normalise so the lowest surface sits at z=0
  var minz=Infinity; for(var j=0;j<M.length;j++) minz=Math.min(minz,M[j].z-M[j].w/2);
  for(var j=0;j<M.length;j++) M[j].z-=minz;
  // drop duplicate consecutive vertices
  var out=[M[0]];
  for(var j=1;j<M.length;j++){ var a=out[out.length-1],b=M[j];
    if(Math.abs(a.u-b.u)>1e-7||Math.abs(a.z-b.z)>1e-7||Math.abs(a.w-b.w)>1e-7) out.push(b); }
  return out;
}

// Ordered perimeter indices to sweep. variant "full" -> all (closed loop);
// "open_back" -> contiguous open arc with a gap centred on +Y (against the column).
function perimeterIndices(base, variant, openFrac){
  var n=base.length;
  if(variant!=="open_back" || openFrac<=0) return { idx:base.map(function(_,i){return i;}), closed:true };
  var half=Math.min(0.49,openFrac)*180;
  function d90(p){ var a=Math.atan2(p[1],p[0])*180/Math.PI; return Math.abs(((a-90)%360+540)%360-180); }
  var keep=base.map(function(p){ return d90(p)>half; });
  var start=-1;
  for(var i=0;i<n;i++){ if(keep[i] && !keep[(i-1+n)%n]){ start=i; break; } }
  if(start<0) return { idx:base.map(function(_,i){return i;}), closed:true };
  var idx=[];
  for(var c=0;c<n;c++){ var i=(start+c)%n; if(keep[i]) idx.push(i); else break; }
  return { idx:idx, closed:false };
}

// ===========================================================================
// Sweep meridian around the cross-section -> closed shell of thickness w
// ===========================================================================
function buildMesh(p){
  // Bottom base is used only for the perimeter-index pattern (count + ordering);
  // the absolute coords are recomputed per-level so the cross-section can
  // INTERPOLATE between bottom dims and top dims (tapered / dust-boot bellows).
  var baseBottom=baseProfile(p.shape,p.sizeX,p.sizeY,p.cornerRadius,p.circleFacets,p.cornerFacets);
  var per=perimeterIndices(baseBottom,p.variant,p.openBackFraction), idx=per.idx, closed=per.closed, m=idx.length;
  var M=buildMeridian(p), L=M.length;
  // z range across the whole meridian (for taper interpolation factor 0..1)
  var zmin=Infinity,zmax=-Infinity;
  for(var i=0;i<L;i++){ var zb=M[i].z-M[i].w/2, zt=M[i].z+M[i].w/2; if(zb<zmin)zmin=zb; if(zt>zmax)zmax=zt; }
  var zspan=Math.max(1e-9,zmax-zmin);
  var outer=new Array(L), inner=new Array(L);
  for(var i=0;i<L;i++){
    var pa=M[Math.max(0,i-1)], pb=M[Math.min(L-1,i+1)];
    var tu=pb.u-pa.u, tz=pb.z-pa.z, tl=Math.hypot(tu,tz)||1; tu/=tl; tz/=tl;
    var nu=tz, nz=-tu, hw=M[i].w/2;
    var tt=(M[i].z-zmin)/zspan;
    var sx=p.sizeX+(p.topSizeX-p.sizeX)*tt;
    var sy=p.sizeY+(p.topSizeY-p.sizeY)*tt;
    var cr=p.cornerRadius+(p.topCornerRadius-p.cornerRadius)*tt;
    var baseLvl=baseProfile(p.shape,sx,sy,cr,p.circleFacets,p.cornerFacets);
    var ro=offsetPolygon(baseLvl,M[i].u+nu*hw), ri=offsetPolygon(baseLvl,M[i].u-nu*hw);
    var zo=M[i].z+nz*hw, zi=M[i].z-nz*hw, oi=new Array(m), ii=new Array(m);
    for(var t=0;t<m;t++){ var g=idx[t]; oi[t]=[ro[g][0],ro[g][1],zo]; ii[t]=[ri[g][0],ri[g][1],zi]; }
    outer[i]=oi; inner[i]=ii;
  }
  var tris=[];
  function tri(a,b,c){ tris.push(a,b,c); }
  function quad(a,b,c,d){ tri(a,b,c); tri(a,c,d); }
  var span=closed?m:m-1;
  for(var i=0;i<L-1;i++) for(var t=0;t<span;t++){ var k=closed?(t+1)%m:t+1;
    quad(outer[i][t],outer[i][k],outer[i+1][k],outer[i+1][t]);
    quad(inner[i][t],inner[i+1][t],inner[i+1][k],inner[i][k]);
  }
  var tp=L-1;
  if(closed){
    for(var t=0;t<m;t++){ var k=(t+1)%m; quad(outer[0][t],inner[0][t],inner[0][k],outer[0][k]); }   // bottom mouth ring
    for(var t=0;t<m;t++){ var k=(t+1)%m; quad(outer[tp][t],outer[tp][k],inner[tp][k],inner[tp][t]); } // top mouth ring
  } else {
    for(var t=0;t<m-1;t++){ quad(outer[0][t],outer[0][t+1],inner[0][t+1],inner[0][t]); }   // bottom mouth ribbon
    for(var t=0;t<m-1;t++){ quad(outer[tp][t],inner[tp][t],inner[tp][t+1],outer[tp][t+1]); } // top mouth ribbon
    for(var i=0;i<L-1;i++){                                                                 // two cut-edge walls
      quad(outer[i][0],inner[i][0],inner[i+1][0],outer[i+1][0]);
      quad(outer[i][m-1],outer[i+1][m-1],inner[i+1][m-1],inner[i][m-1]);
    }
  }

  var triCount=tris.length/3, positions=new Float32Array(triCount*9), normals=new Float32Array(triCount*9), maxz=0;
  for(var f=0;f<triCount;f++){
    var A=tris[f*3],B=tris[f*3+1],C=tris[f*3+2];
    var ux=B[0]-A[0],uy=B[1]-A[1],uz=B[2]-A[2], vx=C[0]-A[0],vy=C[1]-A[1],vz=C[2]-A[2];
    var nx=uy*vz-uz*vy,ny=uz*vx-ux*vz,nz=ux*vy-uy*vx,nl=Math.hypot(nx,ny,nz)||1; nx/=nl;ny/=nl;nz/=nl;
    var vs=[A,B,C];
    for(var v=0;v<3;v++){ var o=(f*3+v)*3; positions[o]=vs[v][0];positions[o+1]=vs[v][1];positions[o+2]=vs[v][2];
      normals[o]=nx;normals[o+1]=ny;normals[o+2]=nz; maxz=Math.max(maxz,vs[v][2]); }
  }
  return { positions:positions, normals:normals, triangleCount:triCount, height:maxz };
}

// ===========================================================================
// Parameter schema + UI
// ===========================================================================
var SCHEMA=[
 {section:"Print State",fields:[
   {key:"foldStyle",label:"Fold style",type:"select",options:["flat_layer","accordion"],def:"flat_layer"},
   {key:"state",label:"State (export = collapsed)",type:"select",options:["collapsed","extended"],def:"collapsed"},
   {key:"layerHeight",label:"Print layer height (mm)",type:"range",min:0.08,max:0.4,step:0.02,def:0.2},
   {key:"interfaceGap",label:"Interface/support gap (mm)",type:"range",min:0.1,max:8,step:0.05,def:0.4,showIf:function(p){return p.state==="collapsed";}},
   {key:"extendedHeight",label:"Extended height (mm)",type:"range",min:10,max:1000,step:1,def:160,showIf:function(p){return p.state==="extended";}},
 ]},
 {section:"Shape (bottom)",fields:[
   {key:"shape",label:"Cross section",type:"select",options:SHAPES,def:"rounded_square"},
   {key:"sizeX",label:"Width X (mm)",type:"range",min:5,max:400,step:1,def:60},
   {key:"sizeY",label:"Depth Y (mm)",type:"range",min:5,max:400,step:1,def:60},
   {key:"cornerRadius",label:"Corner radius (mm)",type:"range",min:0,max:200,step:0.5,def:12,showIf:function(p){return p.shape==="rounded_square";}},
 ]},
 {section:"Shape (top — for tapered / dust-boot bellows)",fields:[
   {key:"topSizeX",label:"Top width X (mm)",type:"range",min:5,max:400,step:1,def:60},
   {key:"topSizeY",label:"Top depth Y (mm)",type:"range",min:5,max:400,step:1,def:60},
   {key:"topCornerRadius",label:"Top corner radius (mm)",type:"range",min:0,max:200,step:0.5,def:12,showIf:function(p){return p.shape==="rounded_square";}},
 ]},
 {section:"Folds",fields:[
   {key:"pleatCount",label:"Number of folds",type:"range",min:1,max:120,step:1,def:12},
   {key:"pleatDepth",label:"Fold depth (mm)",type:"range",min:0.5,max:60,step:0.5,def:8},
   {key:"wallThickness",label:"Wall thickness / TPU layers (mm)",type:"range",min:0.4,max:6,step:0.1,def:0.8},
   {key:"foldProfile",label:"Fold profile",type:"select",options:["sharp","round","trapezoid"],def:"sharp",showIf:function(p){return p.foldStyle==="accordion";}},
   {key:"tipFlatFraction",label:"Tip flat fraction",type:"range",min:0,max:0.45,step:0.01,def:0.25,showIf:function(p){return p.foldStyle==="accordion"&&p.foldProfile==="trapezoid";}},
   {key:"startWithPeak",label:"Start with peak (outer)",type:"check",def:false},
 ]},
 {section:"Bottom Connector",fields:[
   {key:"bottomConnector",label:"Type",type:"select",options:["none","collar","flange","socket","lip"],def:"collar"},
   {key:"bottomLength",label:"Length (mm)",type:"range",min:0,max:80,step:0.5,def:6,showIf:function(p){return p.bottomConnector!=="none";}},
   {key:"bottomFlangeLength",label:"Flange / lip length (mm)",type:"range",min:1,max:60,step:0.5,def:8,showIf:function(p){return p.bottomConnector==="flange"||p.bottomConnector==="lip";}},
   {key:"bottomFlangeThickness",label:"Flange thickness (mm)",type:"range",min:0.4,max:12,step:0.1,def:2,showIf:function(p){return p.bottomConnector==="flange";}},
   {key:"bottomSocketClearance",label:"Socket clearance (mm)",type:"range",min:0,max:5,step:0.1,def:0.4,showIf:function(p){return p.bottomConnector==="socket";}},
 ]},
 {section:"Top Connector",fields:[
   {key:"topConnector",label:"Type",type:"select",options:["none","collar","flange","socket","lip"],def:"collar"},
   {key:"topLength",label:"Length (mm)",type:"range",min:0,max:80,step:0.5,def:6,showIf:function(p){return p.topConnector!=="none";}},
   {key:"topFlangeLength",label:"Flange / lip length (mm)",type:"range",min:1,max:60,step:0.5,def:8,showIf:function(p){return p.topConnector==="flange"||p.topConnector==="lip";}},
   {key:"topFlangeThickness",label:"Flange thickness (mm)",type:"range",min:0.4,max:12,step:0.1,def:2,showIf:function(p){return p.topConnector==="flange";}},
   {key:"topSocketClearance",label:"Socket clearance (mm)",type:"range",min:0,max:5,step:0.1,def:0.4,showIf:function(p){return p.topConnector==="socket";}},
 ]},
 {section:"Variant",fields:[
   {key:"variant",label:"Form",type:"select",options:["full","open_back"],def:"full"},
   {key:"openBackFraction",label:"Back opening (fraction)",type:"range",min:0.05,max:0.49,step:0.01,def:0.25,showIf:function(p){return p.variant==="open_back";}},
 ]},
 {section:"Quality",fields:[
   {key:"circleFacets",label:"Circle facets",type:"range",min:12,max:256,step:1,def:64,showIf:function(p){return p.shape==="circle";}},
   {key:"cornerFacets",label:"Corner facets",type:"range",min:1,max:48,step:1,def:10,showIf:function(p){return p.shape==="rounded_square";}},
   {key:"segmentsPerPleat",label:"Segments / fold (round)",type:"range",min:2,max:48,step:2,def:8,showIf:function(p){return p.foldStyle==="accordion";}},
 ]},
];
var ALL_FIELDS=[]; SCHEMA.forEach(function(s){ s.fields.forEach(function(f){ ALL_FIELDS.push(f); }); });
function defaults(){ var o={}; ALL_FIELDS.forEach(function(f){ o[f.key]=f.def; }); return o; }
var params=defaults();
var fieldEls={};

function buildField(f){
  var el=document.createElement("div"); el.className="field"+(f.type==="check"?" check":"");
  fieldEls[f.key]={el:el,field:f};
  if(f.type==="select"){
    el.innerHTML="<label>"+f.label+"</label>";
    var sel=document.createElement("select");
    f.options.forEach(function(o){ var opt=document.createElement("option"); opt.value=o; opt.textContent=o.replace(/_/g," "); if(o===f.def)opt.selected=true; sel.appendChild(opt); });
    sel.addEventListener("change",function(){ params[f.key]=sel.value; onChange(); });
    el.appendChild(sel); fieldEls[f.key].input=sel;
  } else if(f.type==="check"){
    var lbl=document.createElement("label"); var cb=document.createElement("input"); cb.type="checkbox"; cb.checked=f.def;
    cb.addEventListener("change",function(){ params[f.key]=cb.checked; onChange(); });
    lbl.appendChild(cb); lbl.appendChild(document.createTextNode(f.label)); el.appendChild(lbl); fieldEls[f.key].input=cb;
  } else {
    var isInt=f.step>=1 && Number.isInteger(f.step);
    el.innerHTML="<label>"+f.label+"<span class='val'>"+f.def+"</span></label>";
    var r=document.createElement("input"); r.type="range"; r.min=f.min; r.max=f.max; r.step=f.step; r.value=f.def;
    var valEl=el.querySelector(".val");
    r.addEventListener("input",function(){ var v=parseFloat(r.value); params[f.key]=v; valEl.textContent=isInt?v:(""+v); onChange(); });
    el.appendChild(r); fieldEls[f.key].input=r;
  }
  return el;
}
function buildUI(){
  var root=document.getElementById("controls");
  SCHEMA.forEach(function(sec){
    var wrap=document.createElement("div"); wrap.className="section"; wrap.innerHTML="<h2>"+sec.section+"</h2>";
    var body=document.createElement("div"); body.className="body";
    sec.fields.forEach(function(f){ body.appendChild(buildField(f)); });
    wrap.appendChild(body); root.appendChild(wrap);
  });
  refreshVisibility();
}
function refreshVisibility(){ ALL_FIELDS.forEach(function(f){ if(f.showIf) fieldEls[f.key].el.classList.toggle("hidden",!f.showIf(params)); }); }
var pending=false;
function onChange(){ refreshVisibility(); if(pending) return; pending=true; requestAnimationFrame(function(){ pending=false; rebuild(); }); }

// ===========================================================================
// Minimal WebGL renderer (no dependencies)
// ===========================================================================
var canvas=document.getElementById("glcanvas");
var gl=canvas.getContext("webgl")||canvas.getContext("experimental-webgl");
var glOK=!!gl;
var prog,aPos,aNorm,uMVP,uLight,uColor,uClip,posBuf,normBuf,vertCount=0;
var yaw=0.9,pitch=0.5,radius=200,target=[0,0,46];
function compile(type,src){ var s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s)); return s; }
function initGL(){
  if(!glOK){ document.getElementById("viewport").innerHTML="<p style='color:#f0c674;padding:16px'>WebGL unavailable here. Controls and STL export still work.</p>"; return; }
  var vs="attribute vec3 aPos;attribute vec3 aNorm;uniform mat4 uMVP;varying vec3 vN;varying vec3 vW;void main(){vN=aNorm;vW=aPos;gl_Position=uMVP*vec4(aPos,1.0);}";
  var fs="precision mediump float;varying vec3 vN;varying vec3 vW;uniform vec3 uLight;uniform vec3 uColor;uniform vec4 uClip;void main(){if(dot(uClip.xyz,vW)+uClip.w<0.0)discard;vec3 N=normalize(vN);float d=abs(dot(N,normalize(uLight)));gl_FragColor=vec4(uColor*(0.32+0.68*d),1.0);}";
  prog=gl.createProgram(); gl.attachShader(prog,compile(gl.VERTEX_SHADER,vs)); gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,fs)); gl.linkProgram(prog); gl.useProgram(prog);
  aPos=gl.getAttribLocation(prog,"aPos"); aNorm=gl.getAttribLocation(prog,"aNorm");
  uMVP=gl.getUniformLocation(prog,"uMVP"); uLight=gl.getUniformLocation(prog,"uLight"); uColor=gl.getUniformLocation(prog,"uColor"); uClip=gl.getUniformLocation(prog,"uClip");
  posBuf=gl.createBuffer(); normBuf=gl.createBuffer(); gl.enable(gl.DEPTH_TEST); gl.clearColor(0.106,0.114,0.137,1.0);
}
function perspective(fovy,aspect,n,fr){ var f=1/Math.tan(fovy/2),nf=1/(n-fr); return [f/aspect,0,0,0,0,f,0,0,0,0,(fr+n)*nf,-1,0,0,2*fr*n*nf,0]; }
function vsub(a,b){return [a[0]-b[0],a[1]-b[1],a[2]-b[2]];}
function vcross(a,b){return [a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}
function vdot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}
function vnorm(a){var l=Math.hypot(a[0],a[1],a[2])||1;return [a[0]/l,a[1]/l,a[2]/l];}
function lookAt(eye,c,up){ var z=vnorm(vsub(eye,c)),x=vnorm(vcross(up,z)),y=vcross(z,x);
  return [x[0],y[0],z[0],0,x[1],y[1],z[1],0,x[2],y[2],z[2],0,-vdot(x,eye),-vdot(y,eye),-vdot(z,eye),1]; }
function mmul(a,b){ var o=new Array(16); for(var c=0;c<4;c++)for(var r=0;r<4;r++) o[c*4+r]=a[r]*b[c*4]+a[4+r]*b[c*4+1]+a[8+r]*b[c*4+2]+a[12+r]*b[c*4+3]; return o; }
function clipPlane(){ return [0,0,0,1]; }  // variant cuts are now real geometry
function resize(){ if(!glOK) return; var dpr=Math.min(window.devicePixelRatio||1,2),w=canvas.clientWidth,h=canvas.clientHeight;
  canvas.width=Math.max(1,Math.round(w*dpr)); canvas.height=Math.max(1,Math.round(h*dpr)); }
function draw(){
  if(!glOK||!vertCount) return; resize(); gl.viewport(0,0,canvas.width,canvas.height); gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  var aspect=canvas.width/canvas.height, cp=Math.cos(pitch);
  var eye=[target[0]+radius*cp*Math.cos(yaw),target[1]+radius*cp*Math.sin(yaw),target[2]+radius*Math.sin(pitch)];
  var mvp=mmul(perspective(dtor(45),aspect,1,9000),lookAt(eye,target,[0,0,1]));
  gl.useProgram(prog); gl.uniformMatrix4fv(uMVP,false,new Float32Array(mvp));
  gl.uniform3fv(uLight,new Float32Array([0.4,-0.5,0.9])); gl.uniform3fv(uColor,new Float32Array([0.43,0.66,1.0])); gl.uniform4fv(uClip,new Float32Array(clipPlane()));
  gl.bindBuffer(gl.ARRAY_BUFFER,posBuf); gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,normBuf); gl.enableVertexAttribArray(aNorm); gl.vertexAttribPointer(aNorm,3,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLES,0,vertCount);
}
var drawPending=false;
function requestDraw(){ if(drawPending)return; drawPending=true; requestAnimationFrame(function(){ drawPending=false; draw(); }); }

var lastMesh=null;
function rebuild(){
  var m=buildMesh(params); lastMesh=m; var h=m.height; target=[0,0,h/2];
  var maxDim=Math.max(params.sizeX,params.sizeY,h)+2*params.pleatDepth;
  if(radius<maxDim*0.45||radius>maxDim*3.5) radius=maxDim*1.7;
  if(glOK){ gl.bindBuffer(gl.ARRAY_BUFFER,posBuf); gl.bufferData(gl.ARRAY_BUFFER,m.positions,gl.STATIC_DRAW);
    gl.bindBuffer(gl.ARRAY_BUFFER,normBuf); gl.bufferData(gl.ARRAY_BUFFER,m.normals,gl.STATIC_DRAW); vertCount=m.triangleCount*3; }
  var pitch=params.wallThickness+params.interfaceGap;
  var recipe=(params.state==="collapsed")?" · fold "+pitch.toFixed(2)+"mm = "+params.wallThickness+" wall + "+params.interfaceGap+" gap":"";
  document.getElementById("stats").textContent=m.triangleCount.toLocaleString()+" tris · "+params.state+" height "+h.toFixed(1)+" mm"+recipe;
  var note=document.getElementById("variant-note");
  var msgs=[];
  if(params.state==="extended") msgs.push("Extended view is preview only — export forces collapsed.");
  if(params.interfaceGap<params.layerHeight) msgs.push("Interface gap ("+params.interfaceGap+"mm) is under one layer ("+params.layerHeight+"mm): the support can't print between folds, so they'll fuse — increase the gap.");
  if(params.wallThickness<2*params.layerHeight) msgs.push("Wall is under 2 layers — likely too fragile to peel without tearing.");
  if(msgs.length){ note.classList.remove("hidden"); note.textContent=msgs.join(" "); } else note.classList.add("hidden");
  requestDraw();
}

var dragging=false,lastX=0,lastY=0,pinch=0;
canvas.addEventListener("mousedown",function(e){ dragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener("mousemove",function(e){ if(!dragging)return; rotateBy(e.clientX-lastX,e.clientY-lastY); lastX=e.clientX; lastY=e.clientY; });
window.addEventListener("mouseup",function(){ dragging=false; });
canvas.addEventListener("wheel",function(e){ e.preventDefault(); zoomBy(e.deltaY>0?1.1:0.9); },{passive:false});
canvas.addEventListener("touchstart",function(e){ if(e.touches.length===1){ dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; } else if(e.touches.length===2){ dragging=false; pinch=touchDist(e); } },{passive:false});
canvas.addEventListener("touchmove",function(e){ e.preventDefault();
  if(e.touches.length===1&&dragging){ var t=e.touches[0]; rotateBy(t.clientX-lastX,t.clientY-lastY); lastX=t.clientX; lastY=t.clientY; }
  else if(e.touches.length===2){ var d=touchDist(e); if(pinch) zoomBy(pinch/d); pinch=d; } },{passive:false});
canvas.addEventListener("touchend",function(e){ if(e.touches.length<2)pinch=0; if(e.touches.length===0)dragging=false; });
function touchDist(e){ var a=e.touches[0],b=e.touches[1]; return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY); }
function rotateBy(dx,dy){ yaw-=dx*0.01; pitch=clamp(pitch+dy*0.01,-1.45,1.45); requestDraw(); }
function zoomBy(f){ radius=clamp(radius*f,2,9000); requestDraw(); }

// ===========================================================================
// Binary STL export — always the collapsed (printable) form
// ===========================================================================
function exportSTL(){
  var cp={}; for(var key in params) cp[key]=params[key]; cp.state="collapsed";
  var pos=buildMesh(cp).positions, triCount=pos.length/9, buf=new ArrayBuffer(84+triCount*50), dv=new DataView(buf);
  dv.setUint32(80,triCount,true); var o=84;
  for(var t=0;t<triCount;t++){ var i=t*9;
    var ax=pos[i],ay=pos[i+1],az=pos[i+2],bx=pos[i+3],by=pos[i+4],bz=pos[i+5],cx=pos[i+6],cy=pos[i+7],cz=pos[i+8];
    var ux=bx-ax,uy=by-ay,uz=bz-az,vx=cx-ax,vy=cy-ay,vz=cz-az;
    var nx=uy*vz-uz*vy,ny=uz*vx-ux*vz,nz=ux*vy-uy*vx,nl=Math.hypot(nx,ny,nz)||1; nx/=nl;ny/=nl;nz/=nl;
    dv.setFloat32(o,nx,true);dv.setFloat32(o+4,ny,true);dv.setFloat32(o+8,nz,true);
    dv.setFloat32(o+12,ax,true);dv.setFloat32(o+16,ay,true);dv.setFloat32(o+20,az,true);
    dv.setFloat32(o+24,bx,true);dv.setFloat32(o+28,by,true);dv.setFloat32(o+32,bz,true);
    dv.setFloat32(o+36,cx,true);dv.setFloat32(o+40,cy,true);dv.setFloat32(o+44,cz,true);
    dv.setUint16(o+48,0,true); o+=50;
  }
  var blob=new Blob([buf],{type:"model/stl"}), a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="bellows_"+params.shape+"_"+params.foldStyle+"_collapsed.stl";
  document.body.appendChild(a); a.click(); setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },1000);
}

document.getElementById("export-stl").addEventListener("click",exportSTL);
document.getElementById("reset").addEventListener("click",function(){
  params=defaults();
  ALL_FIELDS.forEach(function(f){ var ref=fieldEls[f.key];
    if(f.type==="check") ref.input.checked=f.def; else if(f.type==="select") ref.input.value=f.def;
    else { ref.input.value=f.def; ref.el.querySelector(".val").textContent=f.def; } });
  yaw=0.9; pitch=0.5; radius=200; onChange();
});
window.addEventListener("resize",requestDraw);
buildUI(); initGL(); rebuild();
</script>
</body>
